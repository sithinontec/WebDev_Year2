<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NaiRarm — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Gamja+Flower&family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link href="./css/main.css" rel="stylesheet" />
  <style>
    /* admin-specific */
    .admin-main { max-width: 1300px; margin: 0 auto; padding: 48px 48px 80px; }
    .admin-page-title { margin-bottom: 40px; }
    .admin-panels { display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px; align-items: start; }
    .admin-panel {
      background: var(--card-bg);
      border: 1px solid rgba(255,244,183,.08);
      border-radius: 24px;
      padding: 28px 28px 32px;
      animation: fadeUp .4s ease both;
    }
    .admin-panel:nth-child(1) { animation-delay: .05s }
    .admin-panel:nth-child(2) { animation-delay: .12s }
    .admin-panel:nth-child(3) { animation-delay: .19s }
    .admin-panel-delete { border-color: rgba(248,113,113,.15); }
    .admin-panel-title { font-family: 'Lora', serif; font-size: 20px; font-weight: 600; color: var(--cream); margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid rgba(255,244,183,.1); }
    .admin-isbn-search { margin-bottom: 20px; }
    .admin-isbn-search label { display: block; font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: .6px; color: rgba(231,231,231,.45); margin-bottom: 8px; }
    .admin-search-row { display: flex; gap: 8px; }
    .admin-search-row input { flex: 1; }
    .admin-search-row .admin-btn { flex-shrink: 0; padding: 0 16px; height: 42px; font-size: 13px; }
    .admin-form { display: flex; flex-direction: column; gap: 14px; }
    .admin-field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .admin-field { display: flex; flex-direction: column; gap: 6px; }
    .admin-field-full { grid-column: 1 / -1; }
    .admin-field label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: .6px; color: rgba(231,231,231,.4); }
    .admin-field input,
    .admin-field textarea {
      background: rgba(0,11,88,.4);
      border: 1px solid rgba(255,244,183,.12);
      border-radius: 10px;
      padding: 10px 14px;
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color .2s, background .2s;
      resize: vertical;
    }
    .admin-field input::placeholder,
    .admin-field textarea::placeholder { color: rgba(255,255,255,.2); }
    .admin-field input:focus,
    .admin-field textarea:focus { border-color: rgba(255,244,183,.4); background: rgba(0,11,88,.7); }
    .admin-field input[readonly],
    .admin-field textarea[readonly] { opacity: .5; cursor: default; }
    .admin-msg { font-size: 13px; min-height: 18px; color: var(--teal-light); }
    .admin-actions { display: flex; gap: 10px; margin-top: 4px; }
    .admin-btn { height: 42px; padding: 0 22px; border: none; border-radius: var(--radius-pill); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: background .2s, transform .15s, box-shadow .2s; }
    .admin-btn-submit { background: var(--teal); color: var(--cream); box-shadow: 0 3px 12px rgba(0,106,103,.3); }
    .admin-btn-submit:hover { background: var(--teal-light); transform: translateY(-1px); box-shadow: 0 6px 18px rgba(0,106,103,.45); }
    .admin-btn-clear { background: rgba(217,217,217,.1); color: rgba(231,231,231,.6); border: 1px solid rgba(255,255,255,.08); }
    .admin-btn-clear:hover { background: rgba(217,217,217,.18); transform: translateY(-1px); }
    .admin-btn-danger { background: rgba(185,28,28,.7); color: #fecaca; box-shadow: 0 3px 12px rgba(185,28,28,.3); }
    .admin-btn-danger:hover { background: rgba(220,38,38,.8); transform: translateY(-1px); box-shadow: 0 6px 18px rgba(220,38,38,.4); }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <a class="logo" href="index.html">NaiRarm</a>
  </header>

  <!-- Nav -->
  <nav>
    <button class="nav-btn" onclick="location.href='index.html'">Home</button>
    <button class="nav-btn" onclick="location.href='search.html'">Browse</button>
    <button class="nav-btn active" onclick="location.href='login.html'">Admin</button>
    <span class="nav-spacer"></span>
    <button class="nav-btn" onclick="location.href='team.html'">Our Team</button>
  </nav>

  <!-- Admin page -->
  <main class="admin-main">

    <div class="admin-page-title">
      <h1 class="section-heading">Administrator</h1>
    </div>

    <div class="admin-panels">

      <!-- ── ADD NEW BOOK ──────────────────────────── -->
      <section class="admin-panel">
        <h2 class="admin-panel-title">Add new book</h2>

        <div class="admin-form" id="add-form">
          <div class="admin-field-row">
            <div class="admin-field">
              <label>Title</label>
              <input type="text" placeholder="Book title" />
            </div>
            <div class="admin-field">
              <label>ISBN</label>
              <input type="text" placeholder="e.g. 9780062060624" />
            </div>
          </div>
          <div class="admin-field-row">
            <div class="admin-field">
              <label>Author</label>
              <input type="text" placeholder="Author name" />
            </div>
            <div class="admin-field">
              <label>Price (baht)</label>
              <input type="number" placeholder="e.g. 300" min="0" />
            </div>
          </div>
          <div class="admin-field-row">
            <div class="admin-field">
              <label>Genre</label>
              <input type="text" placeholder="e.g. Fiction, Romance" />
            </div>
            <div class="admin-field">
              <label>Publisher</label>
              <input type="text" placeholder="Publisher name" />
            </div>
          </div>
          <div class="admin-field-row">
            <div class="admin-field">
              <label>Pub. Date</label>
              <input type="date" />
            </div>
            <div class="admin-field">
              <label>Cover (URL or filename)</label>
              <input type="text" placeholder="cover.jpg" />
            </div>
          </div>
          <div class="admin-field admin-field-full">
            <label>Synopsis</label>
            <textarea placeholder="Enter book synopsis…" rows="4"></textarea>
          </div>
          <p class="admin-msg" id="add-msg"></p>
          <div class="admin-actions">
            <button class="admin-btn admin-btn-submit" onclick="handleAdd()">Submit</button>
            <button class="admin-btn admin-btn-clear" onclick="clearForm('add-form', 'add-msg')">Clear</button>
          </div>
        </div>
      </section>

      <!-- ── EDIT EXISTING BOOK ───────────────────── -->
      <section class="admin-panel">
        <h2 class="admin-panel-title">Edit existed book</h2>

        <div class="admin-isbn-search">
          <label>ISBN Search</label>
          <div class="admin-search-row">
            <input type="text" id="edit-isbn" placeholder="Enter ISBN to look up" />
            <button class="admin-btn admin-btn-submit" onclick="handleEditSearch()">Search</button>
          </div>
        </div>

        <div class="admin-form" id="edit-form">
          <div class="admin-field-row">
            <div class="admin-field">
              <label>Title</label>
              <input type="text" placeholder="Book title" />
            </div>
            <div class="admin-field">
              <label>ISBN</label>
              <input type="text" placeholder="e.g. 9780062060624" />
            </div>
          </div>
          <div class="admin-field-row">
            <div class="admin-field">
              <label>Author</label>
              <input type="text" placeholder="Author name" />
            </div>
            <div class="admin-field">
              <label>Price (baht)</label>
              <input type="number" placeholder="e.g. 300" min="0" />
            </div>
          </div>
          <div class="admin-field-row">
            <div class="admin-field">
              <label>Genre</label>
              <input type="text" placeholder="e.g. Fiction, Romance" />
            </div>
            <div class="admin-field">
              <label>Publisher</label>
              <input type="text" placeholder="Publisher name" />
            </div>
          </div>
          <div class="admin-field-row">
            <div class="admin-field">
              <label>Pub. Date</label>
              <input type="date" />
            </div>
            <div class="admin-field">
              <label>Cover (URL or filename)</label>
              <input type="text" placeholder="cover.jpg" />
            </div>
          </div>
          <div class="admin-field admin-field-full">
            <label>Synopsis</label>
            <textarea placeholder="Enter book synopsis…" rows="4"></textarea>
          </div>
          <p class="admin-msg" id="edit-msg"></p>
          <div class="admin-actions">
            <button class="admin-btn admin-btn-submit" onclick="handleEdit()">Submit</button>
            <button class="admin-btn admin-btn-clear" onclick="clearForm('edit-form', 'edit-msg')">Clear</button>
          </div>
        </div>
      </section>

      <!-- ── DELETE BOOK ──────────────────────────── -->
      <section class="admin-panel admin-panel-delete">
        <h2 class="admin-panel-title">Delete book</h2>

        <div class="admin-isbn-search">
          <label>ISBN Search</label>
          <div class="admin-search-row">
            <input type="text" id="delete-isbn" placeholder="Enter ISBN to look up" />
            <button class="admin-btn admin-btn-submit" onclick="handleDeleteSearch()">Search</button>
          </div>
        </div>

        <div class="admin-form" id="delete-form">
          <div class="admin-field-row">
            <div class="admin-field">
              <label>Title</label>
              <input type="text" placeholder="—" readonly />
            </div>
            <div class="admin-field">
              <label>ISBN</label>
              <input type="text" placeholder="—" readonly />
            </div>
          </div>
          <div class="admin-field-row">
            <div class="admin-field">
              <label>Author</label>
              <input type="text" placeholder="—" readonly />
            </div>
            <div class="admin-field">
              <label>Price (baht)</label>
              <input type="text" placeholder="—" readonly />
            </div>
          </div>
          <div class="admin-field-row">
            <div class="admin-field">
              <label>Genre</label>
              <input type="text" placeholder="—" readonly />
            </div>
            <div class="admin-field">
              <label>Publisher</label>
              <input type="text" placeholder="—" readonly />
            </div>
          </div>
          <div class="admin-field-row">
            <div class="admin-field">
              <label>Pub. Date</label>
              <input type="text" placeholder="—" readonly />
            </div>
            <div class="admin-field">
              <label>Cover</label>
              <input type="text" placeholder="—" readonly />
            </div>
          </div>
          <div class="admin-field admin-field-full">
            <label>Synopsis</label>
            <textarea placeholder="—" rows="4" readonly></textarea>
          </div>
          <p class="admin-msg" id="delete-msg"></p>
          <div class="admin-actions">
            <button class="admin-btn admin-btn-danger" onclick="handleDelete()">Submit</button>
            <button class="admin-btn admin-btn-clear" onclick="clearForm('delete-form', 'delete-msg')">Clear</button>
          </div>
        </div>
      </section>

    </div><!-- /admin-panels -->
  </main>

  <script>
    function showMsg(id, text, type) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.style.color = type === 'success' ? 'var(--teal-light)' : '#f87171';
    }

    function clearForm(formId, msgId) {
      document.querySelectorAll('#' + formId + ' input, #' + formId + ' textarea').forEach(el => {
        if (!el.readOnly) el.value = '';
      });
      if (msgId) document.getElementById(msgId).textContent = '';
    }

    function handleAdd() {
      const inputs = document.querySelectorAll('#add-form input, #add-form textarea');
      const empty = [...inputs].some(i => !i.value.trim());
      if (empty) { showMsg('add-msg', 'Please fill in all fields.', 'error'); return; }
      showMsg('add-msg', 'Book added successfully!', 'success');
    }

    function handleEditSearch() {
      const isbn = document.getElementById('edit-isbn').value.trim();
      if (!isbn) { showMsg('edit-msg', 'Please enter an ISBN to search.', 'error'); return; }
      // Placeholder: in a real app, fetch book data by ISBN and populate fields
      showMsg('edit-msg', 'Book found. You may edit the fields below.', 'success');
    }

    function handleEdit() {
      const inputs = document.querySelectorAll('#edit-form input, #edit-form textarea');
      const empty = [...inputs].some(i => !i.value.trim());
      if (empty) { showMsg('edit-msg', 'Please fill in all fields.', 'error'); return; }
      showMsg('edit-msg', 'Book updated successfully!', 'success');
    }

    function handleDeleteSearch() {
      const isbn = document.getElementById('delete-isbn').value.trim();
      if (!isbn) { showMsg('delete-msg', 'Please enter an ISBN to search.', 'error'); return; }
      // Placeholder: populate readonly fields with found book data
      showMsg('delete-msg', 'Book found. Press Submit to confirm deletion.', 'success');
    }

    function handleDelete() {
      const isbn = document.getElementById('delete-isbn').value.trim();
      if (!isbn) { showMsg('delete-msg', 'Search for a book first.', 'error'); return; }
      showMsg('delete-msg', 'Book deleted successfully.', 'success');
      clearForm('delete-form', null);
      document.getElementById('delete-isbn').value = '';
    }
  </script>

</body>
</html>
