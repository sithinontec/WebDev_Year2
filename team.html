<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NaiRarm — Our Team</title>
  <link href="https://fonts.googleapis.com/css2?family=Gamja+Flower&family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link href="./css/main.css" rel="stylesheet" />
  <style>
    /* team-specific */
    .team-main { max-width: 900px; margin: 0 auto; padding: 64px 48px 80px; }
    .team-header { display: flex; align-items: center; gap: 18px; margin-bottom: 52px; }
    .team-heading { font-family: 'Gamja Flower', cursive; font-size: 64px; color: var(--cream); line-height: 1; }
    .team-section-tag {
      display: inline-block;
      padding: 6px 18px;
      background: var(--teal);
      color: var(--white);
      font-size: 14px;
      font-weight: 500;
      border-radius: var(--radius-pill);
      letter-spacing: .4px;
      margin-top: 8px;
    }
    .team-grid { display: flex; flex-direction: column; gap: 20px; }
    .team-card {
      display: flex;
      align-items: center;
      gap: 24px;
      background: var(--card-bg);
      border: 1px solid rgba(255,244,183,.08);
      border-radius: var(--radius-card);
      padding: 24px 32px;
      transition: transform .2s ease, background .2s ease, box-shadow .2s ease;
      animation: fadeUp .4s ease both;
    }
    .team-card:nth-child(1) { animation-delay: .05s }
    .team-card:nth-child(2) { animation-delay: .12s }
    .team-card:nth-child(3) { animation-delay: .19s }
    .team-card:nth-child(4) { animation-delay: .26s }
    .team-card:hover { transform: translateX(6px); background: var(--card-hover); box-shadow: 0 8px 32px rgba(0,0,0,.35); }
    .team-avatar {
      width: 60px; height: 60px;
      border-radius: 50%;
      background: var(--teal);
      color: var(--cream);
      font-family: 'Lora', serif;
      font-size: 26px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border: 2px solid rgba(255,244,183,.2);
    }
    .team-info { display: flex; flex-direction: column; gap: 4px; }
    .team-name { font-family: 'Lora', serif; font-size: 22px; font-weight: 600; color: var(--white); }
    .team-id { font-size: 13px; color: rgba(231,231,231,.45); font-weight: 300; letter-spacing: .5px; }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <a class="logo" href="index.html">NaiRarm</a>
  </header>

  <!-- Nav -->
  <nav>
    <button class="nav-btn" onclick="location.href='index.html'">Home</button>
    <button class="nav-btn" onclick="location.href='search.html'">Browse</button>
    <button class="nav-btn" onclick="location.href='login.html'">Admin</button>
    <span class="nav-spacer"></span>
    <button class="nav-btn active" onclick="location.href='team.html'">Our Team</button>
  </nav>

  <!-- Main -->
  <main class="team-main">

    <div class="team-header">
      <h1 class="team-heading">Meet our team</h1>
      <span class="team-section-tag">Section 3</span>
    </div>

    <div class="team-grid">

      <div class="team-card">
        <div class="team-avatar">P</div>
        <div class="team-info">
          <span class="team-name">Pimkwan Chiraprawattrakun</span>
          <span class="team-id">6788017</span>
        </div>
      </div>

      <div class="team-card">
        <div class="team-avatar">T</div>
        <div class="team-info">
          <span class="team-name">Tanapon Pholboon</span>
          <span class="team-id">6788088</span>
        </div>
      </div>

      <div class="team-card">
        <div class="team-avatar">S</div>
        <div class="team-info">
          <span class="team-name">Sithinon Techkarnjanaruk</span>
          <span class="team-id">6788128</span>
        </div>
      </div>

      <div class="team-card">
        <div class="team-avatar">S</div>
        <div class="team-info">
          <span class="team-name">Saw Say Hae Khu</span>
          <span class="team-id">6788175</span>
        </div>
      </div>

    </div>

  </main>

</body>
</html>
