<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NaiRarm — Search</title>
  <link href="https://fonts.googleapis.com/css2?family=Gamja+Flower&family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link href="./css/main.css" rel="stylesheet" />
  <style>
    /* search-specific */
    main {
      max-width: 1300px;
      margin: 0 auto;
      padding: 56px 48px 80px;
    }
    .search-banner {
      background: var(--navy-deep);
      padding: 36px 48px 32px;
      border-bottom: 1px solid rgba(255,244,183,.1);
    }
    .search-banner-title {
      font-family: 'Gamja Flower', cursive;
      font-size: 48px;
      color: var(--cream);
      margin-bottom: 24px;
    }
    .search-fields {
      display: flex;
      gap: 16px;
      align-items: flex-end;
      flex-wrap: wrap;
    }
    .search-field {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
      min-width: 180px;
    }
    .search-field label {
      font-size: 13px;
      font-weight: 500;
      color: var(--cream);
      letter-spacing: .5px;
      text-transform: uppercase;
    }
    .search-field input,
    .search-field select {
      height: 48px;
      padding: 0 18px;
      border-radius: var(--radius-pill);
      border: 1px solid rgba(255,244,183,.2);
      background: rgba(255,252,252,.08);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color .2s, background .2s;
      appearance: none;
      -webkit-appearance: none;
    }
    .search-field input::placeholder { color: rgba(255,255,255,.35); }
    .search-field input:focus,
    .search-field select:focus { border-color: var(--cream); background: rgba(255,252,252,.13); }
    .select-wrapper { position: relative; }
    .select-wrapper::after {
      content: '▾';
      position: absolute;
      right: 18px; top: 50%;
      transform: translateY(-50%);
      color: var(--cream);
      pointer-events: none;
      font-size: 14px;
    }
    .select-wrapper select { width: 100%; padding-right: 40px; cursor: pointer; }
    .select-wrapper select option { background: var(--navy-deep); color: var(--white); }
    .search-btn {
      height: 48px;
      padding: 0 32px;
      background: var(--cream);
      color: #111;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      border: none;
      border-radius: var(--radius-pill);
      cursor: pointer;
      transition: background .2s, transform .15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .search-btn:hover { background: var(--cream-dim); transform: translateY(-1px); }
    .results-header { display: flex; align-items: baseline; gap: 16px; margin-bottom: 28px; }
    .results-label { font-family: 'Gamja Flower', cursive; font-size: 56px; color: var(--cream); line-height: 1; }
    .results-tag {
      display: inline-block;
      padding: 4px 14px;
      background: var(--teal);
      color: var(--white);
      font-size: 13px;
      font-weight: 500;
      border-radius: var(--radius-pill);
    }
    .no-results { color: rgba(231,231,231,.5); font-size: 18px; font-style: italic; text-align: center; padding: 48px 0; }
    .loading { color: var(--cream); text-align: center; padding: 48px 0; font-size: 18px; }
    
    /* Book card clickable styles */
    .book-card {
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .book-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(0,0,0,.4);
    }
    
    /* Book cover with image */
    .book-cover {
      position: relative;
      overflow: hidden;
    }
    .book-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: inherit;
    }
    .book-cover .placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      font-size: 14px;
      color: rgba(255,255,255,.35);
      font-style: italic;
    }
    
    /* Animation delays for cards */
    .book-grid .book-card:nth-child(1) { animation-delay: .05s }
    .book-grid .book-card:nth-child(2) { animation-delay: .10s }
    .book-grid .book-card:nth-child(3) { animation-delay: .15s }
    .book-grid .book-card:nth-child(4) { animation-delay: .20s }
    .book-grid .book-card:nth-child(5) { animation-delay: .25s }
    .book-grid .book-card:nth-child(6) { animation-delay: .30s }
    .book-grid .book-card:nth-child(7) { animation-delay: .35s }
    .book-grid .book-card:nth-child(8) { animation-delay: .40s }
    .book-grid .book-card:nth-child(9) { animation-delay: .45s }
    .book-grid .book-card:nth-child(10) { animation-delay: .50s }
  </style>
</head>
<body>
  <!-- Header -->
  <header>
    <a class="logo" href="index.html">NaiRarm</a>
  </header>

  <!-- Nav -->
  <nav>
    <button class="nav-btn" onclick="location.href='index.html'">Home</button>
    <button class="nav-btn active" onclick="location.href='search.html'">Browse</button>
    <button class="nav-btn" onclick="location.href='login.html'">Admin</button>
    <span class="nav-spacer"></span>
    <button class="nav-btn" onclick="location.href='team.html'">Our Team</button>
  </nav>

  <!-- Search Banner -->
  <section class="search-banner">
    <p class="search-banner-title">Search Books</p>
    <div class="search-fields">
      <div class="search-field">
        <label for="search-title">Title</label>
        <input id="search-title" type="text" placeholder="Enter the title" />
      </div>
      <div class="search-field">
        <label for="search-author">Author</label>
        <input id="search-author" type="text" placeholder="Enter the author's name" />
      </div>
      <div class="search-field">
        <label for="search-genre">Genre</label>
        <div class="select-wrapper">
          <select id="search-genre">
            <option value="">All genres</option>
            <option value="nonfiction">NonFiction</option>
            <option value="fiction">Fiction</option>
            <option value="mystery">Mystery</option>
            <option value="romance">Romance</option>
            <option value="scifi">Sci-Fi</option>
            <option value="horror">Horror</option>
          </select>
        </div>
      </div>
      <button class="search-btn" onclick="runSearch()">Search</button>
    </div>
  </section>

  <!-- Results -->
  <main>
    <div class="results-header">
      <span class="results-label">Results</span>
      <span class="results-tag" id="active-genre-tag">All</span>
    </div>
    
    <!-- Loading indicator -->
    <p class="loading" id="loading" style="display:none;">Loading books...</p>
    
    <!-- Book grid populated by JavaScript -->
    <article class="book-grid" id="results-grid">
      <!-- Books will be inserted here by JavaScript -->
    </article>
    
    <!-- No results message -->
    <p class="no-results" id="no-results" style="display:none;">No books found matching your search.</p>
  </main>

  <script>
    // ============================================
    // API Configuration
    // ============================================
    
    // Backend API URL - update this to match your backend server
    const API_BASE_URL = 'http://localhost:3000/api';
    
    // ============================================
    // Page Initialization
    // ============================================
    
    // Load all books when page loads
    document.addEventListener('DOMContentLoaded', () => {
      runSearch();
    });
    
    // ============================================
    // Search Function - Fetches books from API
    // ============================================
    
    async function runSearch() {
      const titleQ = document.getElementById('search-title').value.trim();
      const authorQ = document.getElementById('search-author').value.trim();
      const genreQ = document.getElementById('search-genre').value;
      
      const tag = document.getElementById('active-genre-tag');
      const grid = document.getElementById('results-grid');
      const noRes = document.getElementById('no-results');
      const loading = document.getElementById('loading');
      
      // Update the genre tag display
      const genreLabel = document.getElementById('search-genre')
        .options[document.getElementById('search-genre').selectedIndex].text;
      tag.textContent = genreQ ? genreLabel : 'All';
      
      // Show loading, hide results
      loading.style.display = 'block';
      grid.innerHTML = '';
      noRes.style.display = 'none';
      
      try {
        // Build query string with search criteria
        const params = new URLSearchParams();
        if (titleQ) params.append('title', titleQ);
        if (authorQ) params.append('author', authorQ);
        if (genreQ) params.append('genre', genreQ);
        
        // Fetch books from API
        const response = await fetch(`${API_BASE_URL}/books?${params.toString()}`);
        const result = await response.json();
        
        // Hide loading
        loading.style.display = 'none';
        
        if (result.success && result.data.length > 0) {
          // Render book cards
          renderBooks(result.data);
          noRes.style.display = 'none';
        } else {
          // No results found
          noRes.style.display = 'block';
        }
        
      } catch (error) {
        console.error('Search error:', error);
        loading.style.display = 'none';
        noRes.textContent = 'Error loading books. Please check if the backend server is running.';
        noRes.style.display = 'block';
      }
    }
    
    // ============================================
    // Render Books - Creates book card HTML
    // ============================================
    
   function renderBooks(books) {
  const grid = document.getElementById('results-grid');
  
  grid.innerHTML = books.map(book => `
    <article class="book-card" onclick="goToDetail(${book.id})">
      <div class="book-cover">
        ${book.cover_url
          ? `<img src="${book.cover_url}" />`
          : '<span class="placeholder">Book Cover</span>'
        }
      </div>
      <div class="book-info">
        <span class="book-title">${book.title}</span>
        <span class="book-author">${book.author}</span>
        <span class="book-price">${book.price} baht</span>
      </div>
    </article>
  `).join('');
}
    
    // ============================================
    // Navigate to Detail Page
    // ============================================
    
    function goToDetail(bookId) {
      // Navigate to detail page with book ID as URL parameter
      window.location.href = `detail.html?id=${bookId}`;
    }
    
    // ============================================
    // Utility: Escape HTML to prevent XSS
    // ============================================
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    // ============================================
    // Allow Enter key to trigger search
    // ============================================
    
    document.querySelectorAll('.search-field input').forEach(input => {
      input.addEventListener('keydown', e => { 
        if (e.key === 'Enter') runSearch(); 
      });
    });
  </script>
</body>
</html>
