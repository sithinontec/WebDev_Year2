<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NaiRarm — Admin Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Gamja+Flower&family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link href="./css/main.css" rel="stylesheet" />
  <style>
    /* login-specific */
    .login-main {
      min-height: calc(100vh - 136px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px;
    }
    .login-card {
      background: var(--card-bg);
      border: 1px solid rgba(255,244,183,.1);
      border-radius: 28px;
      padding: 52px 56px 48px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 24px 64px rgba(0,0,0,.45);
      animation: fadeUp .4s ease both;
    }
    .login-title { font-family: 'Lora', serif; font-size: 32px; font-weight: 600; color: var(--cream); margin-bottom: 36px; line-height: 1.2; }
    .login-form { display: flex; flex-direction: column; gap: 24px; }
    .login-field { display: flex; flex-direction: column; gap: 8px; }
    .login-field label { font-size: 13px; font-weight: 500; text-transform: uppercase; letter-spacing: .6px; color: rgba(231,231,231,.5); }
    .login-field input {
      height: 52px;
      padding: 0 20px;
      background: rgba(0,11,88,.5);
      border: 1px solid rgba(255,244,183,.15);
      border-radius: var(--radius-pill);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      outline: none;
      transition: border-color .2s, background .2s;
      width: 100%;
    }
    .login-field input::placeholder { color: rgba(255,255,255,.25); }
    .login-field input:focus { border-color: var(--cream); background: rgba(0,11,88,.8); }
    .login-password-wrapper { position: relative; }
    .login-password-wrapper input { padding-right: 52px; }
    .login-eye-btn {
      position: absolute;
      right: 16px; top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(231,231,231,.4);
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      transition: color .2s;
    }
    .login-eye-btn:hover { color: var(--cream); }
    .login-error { font-size: 14px; color: #f87171; min-height: 20px; margin-top: -8px; }
    .login-actions { display: flex; gap: 12px; margin-top: 8px; }
    .login-btn { flex: 1; height: 52px; border: none; border-radius: var(--radius-pill); font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 500; cursor: pointer; transition: background .2s, transform .15s, box-shadow .2s; }
    .login-btn-submit { background: var(--teal); color: var(--cream); box-shadow: 0 4px 16px rgba(0,106,103,.35); }
    .login-btn-submit:hover { background: var(--teal-light); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,106,103,.5); }
    .login-btn-clear { background: rgba(217,217,217,.12); color: rgba(231,231,231,.7); border: 1px solid rgba(255,255,255,.1); }
    .login-btn-clear:hover { background: rgba(217,217,217,.2); transform: translateY(-2px); }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <a class="logo" href="index.html">NaiRarm</a>
  </header>

  <!-- Nav -->
  <nav>
    <button class="nav-btn" onclick="location.href='index.html'">Home</button>
    <button class="nav-btn" onclick="location.href='search.html'">Browse</button>
    <button class="nav-btn active" onclick="location.href='login.html'">Admin</button>
    <span class="nav-spacer"></span>
    <button class="nav-btn" onclick="location.href='team.html'">Our Team</button>
  </nav>

  <!-- Login -->
  <main class="login-main">
    <div class="login-card">

      <h1 class="login-title">Login for Administer</h1>

      <div class="login-form">

        <div class="login-field">
          <label for="login-username">Username</label>
          <input id="login-username" type="text" placeholder="Enter username" />
        </div>

        <div class="login-field">
          <label for="login-password">Password</label>
          <div class="login-password-wrapper">
            <input id="login-password" type="password" placeholder="Enter password" />
            <button class="login-eye-btn" type="button" onclick="togglePassword()" title="Show/hide password">
              <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <p class="login-error" id="login-error"></p>

        <div class="login-actions">
          <button class="login-btn login-btn-submit" onclick="handleSubmit()">Submit</button>
          <button class="login-btn login-btn-clear" onclick="handleClear()">Clear</button>
        </div>

      </div>
    </div>
  </main>

  <script>
    function togglePassword() {
      const input = document.getElementById('login-password');
      const icon  = document.getElementById('eye-icon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.innerHTML = `
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
          <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
          <line x1="1" y1="1" x2="23" y2="23"/>`;
      } else {
        input.type = 'password';
        icon.innerHTML = `
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>`;
      }
    }

    async function handleSubmit() {
      const username = document.getElementById('login-username').value.trim();
      const password = document.getElementById('login-password').value;
      const errorEl  = document.getElementById('login-error');

      errorEl.style.color = '#f87171';

      if (!username || !password) {
        errorEl.textContent = 'Please fill in both fields.';
        return;
      }

      try {
        const resp = await fetch('http://localhost:3000/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await resp.json();

        if (resp.ok && data.success) {
          errorEl.style.color = 'var(--teal-light)';
          errorEl.textContent = 'Login successful! Redirecting…';
          setTimeout(() => location.href = 'admin.html', 800);
        } else {
          errorEl.textContent = data.message || 'Incorrect username or password.';
        }
      } catch (err) {
        console.error('Login error:', err);
        errorEl.textContent = 'Network error — please try again.';
      }
    }

    function handleClear() {
      document.getElementById('login-username').value = '';
      document.getElementById('login-password').value = '';
      document.getElementById('login-error').textContent = '';
    }

    // Allow Enter key to submit
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
        handleSubmit();
      }
    });
  </script>

</body>
</html>
